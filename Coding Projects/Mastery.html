<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Game Tracker</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:20px;
    background:#f5f5f5;
}

/* Navigation Bar */
        .navbar {
            margin:-20px;
            background-color: #333;
            color: white;
            padding: 15px 20px;
        }

        .navbar h1 {
            display: inline;
        }

        .nav-links {
            float: right;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            color: #00bcd4;
        }

h1{
    margin-bottom:15px;
}

.filters{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:20px;
}

.filters input,
.filters select{
    padding:8px;
    width:100%;
}

.stats{
    display:flex;
    gap:25px;
    margin-bottom:15px;
    font-weight:bold;
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}

th{
    background:#333;
    color:white;
}

.progress-select{
    width:100%;
}

/* Row Colors */
.no-progress{
    background:#ffffff;
}

.in-progress{
    background:#cd7f32;
    color:white;
}

.beaten{
    background:#c0c0c0;
}

.completed{
    background:#ffd700;
}

.all-cheevos{
    background:#4da6ff;
    color:white;
}

.all-subsets{
    background:#9966cc;
    color:white;
}

.award{
    font-size:24px;
    text-align:center;
}
</style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <h1>Electro</h1>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">Speedruns</a>
            <a href="Mastery.html">Mastery</a>
            <a href="#">Sports</a>
        </div>
    </div>

<h1>Video Game Collection Tracker</h1>

<div class="stats">
    <div>Total Games: <span id="rowCount">0</span></div>
    <div>Completed Games: <span id="completedCount">0</span></div>
    <div>All Cheevos: <span id="cheevosCount">0</span></div>
</div>

<div class="filters">
    <input type="text" id="titleFilter" placeholder="Video Game Title">
    <input type="text" id="genreFilter" placeholder="Genre">
    <input type="text" id="franchiseFilter" placeholder="Franchise">
    <input type="text" id="consoleFilter" placeholder="Console">
    <input type="text" id="companyFilter" placeholder="Company">

    <select id="progressFilter">
        <option value="">All Progress</option>
        <option>No Progress</option>
        <option>In Progress</option>
        <option>Beaten</option>
        <option>Completed</option>
        <option>All Cheevos</option>
        <option>Mastered</option>
    </select>

    <input type="text" id="rankFilter" placeholder="Rank">
</div>


<!--Remove Comment below to Add file if lost-->

<button id="loadBtn">Load Game List</button>

<input type="file" id="txtFile" accept=".txt" hidden>

<table id="gameTable">
<thead>
<tr>
    <th>Game Title</th>
    <th>Genre</th>
    <th>Franchise</th>
    <th>Console</th>
    <th>Company</th>
    <th>Progress</th>
    <th>Rank</th>
    <th>Award Icon</th>
    <th>Award Icon 2</th>
</tr>
</thead>
<tbody>


</tbody>
</table>

<script>

 window.addEventListener("load", () => {

    fetch("games.txt")
        .then(response => response.text())
        .then(text => {
            buildTableFromText(text);
        })
        .catch(err => {
            console.log("games.txt not found");
        });

});

document.getElementById("loadBtn").addEventListener("click", () => {
    document.getElementById("txtFile").click();
});

let fileHandle;

async function openFile() {
    [fileHandle] = await window.showOpenFilePicker({
        types: [{
            description: "Text Files",
            accept: {
                "text/plain": [".txt"]
            }
        }]
    });

    const file = await fileHandle.getFile();
    const text = await file.text();
    buildTableFromText(text);
}

window.addEventListener("load", async () => {
    try {
        await openFile();
    } catch (e) {
        console.log("No file selected.");
    }
});

function updateRow(row){

    const progress = row.querySelector('.progress').textContent.trim();
    row.className = '';

    const award1 = row.querySelector('.award1');
    const award2 = row.querySelector('.award2');

    award1.innerHTML = '';
    award2.innerHTML = '';

    switch(progress){

        case "No Progress":
            row.classList.add("no-progress");
            break;

        case "In Progress":
            row.classList.add("in-progress");
            break;

        case "Beaten":
            row.classList.add("beaten");
            break;

        case "Completed":
            row.classList.add("completed");
            award1.innerHTML = "🏆";
            break;

        case "All Cheevos":
            row.classList.add("all-cheevos");
            award2.innerHTML = "💎";
            break;

        case "Mastered":
            row.classList.add("all-subsets");
            award1.innerHTML = "🏆";
            award2.innerHTML = "🔮";
            break;
    }
}

function sortTableByTitle() {
    const tbody = document.querySelector("#gameTable tbody");

    const rows = Array.from(tbody.querySelectorAll("tr"));

    rows.sort((a, b) => {
        const titleA = a.cells[0].textContent.trim().toLowerCase();
        const titleB = b.cells[0].textContent.trim().toLowerCase();

        return titleA.localeCompare(titleB);
    });

    rows.forEach(row => tbody.appendChild(row));
}

function updateCounters(){

    let completed = 0;
    let cheevos = 0;

    document.querySelectorAll("#gameTable tbody tr").forEach(row=>{

        const progress = row.querySelector(".progress").textContent.trim();

        if(progress === "Completed"){
            completed++;
        }

        if(progress === "All Cheevos"){
            cheevos++;
        }

        if(progress === "Mastered"){
            completed++;
        }

        if(progress === "Mastered"){
            cheevos++;
        }

    });

    document.getElementById("completedCount").textContent = completed;
    document.getElementById("cheevosCount").textContent = cheevos;
}

function filterTable(){

    const title = document.getElementById("titleFilter").value.toLowerCase();
    const genre = document.getElementById("genreFilter").value.toLowerCase();
    const franchise = document.getElementById("franchiseFilter").value.toLowerCase();
    const consoleF = document.getElementById("consoleFilter").value.toLowerCase();
    const company = document.getElementById("companyFilter").value.toLowerCase();
    const progress = document.getElementById("progressFilter").value;
    const rank = document.getElementById("rankFilter").value.toLowerCase();

    let visibleRows = 0;

    document.querySelectorAll("#gameTable tbody tr").forEach(row=>{

        const cells = row.cells;

        const show =
            cells[0].textContent.toLowerCase().includes(title) &&
            cells[1].textContent.toLowerCase().includes(genre) &&
            cells[2].textContent.toLowerCase().includes(franchise) &&
            cells[3].textContent.toLowerCase().includes(consoleF) &&
            cells[4].textContent.toLowerCase().includes(company) &&
            cells[6].textContent.toLowerCase().includes(rank) &&
            progress === "" ||
            row.querySelector(".progress").textContent.trim() === progress

        row.style.display = show ? "" : "none";

        if(show){
            visibleRows++;
        }
    });

    document.getElementById("rowCount").textContent = visibleRows;
}

document.querySelectorAll(".filters input, .filters select")
.forEach(el=>{
    el.addEventListener("input", filterTable);
    el.addEventListener("change", filterTable);
});

document.getElementById("txtFile").addEventListener("change", loadTxtFile);

function loadTxtFile(event) {

    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const text = e.target.result;

        buildTableFromText(text);
    };

    reader.readAsText(file);
}

function buildTableFromText(text) {

    const tbody = document.querySelector("#gameTable tbody");

    tbody.innerHTML = "";

    const lines = text.split(/\r?\n/);

    lines.forEach(line => {

        if (!line.trim()) return;

        const parts = line.split("|");

        if (parts.length < 7) return;

        const [
            title,
            genre,
            franchise,
            consoleName,
            company,
            progress,
            rank
        ] = parts;

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${title}</td>
            <td>${genre}</td>
            <td>${franchise}</td>
            <td>${consoleName}</td>
            <td>${company}</td>
            <td class="progress">${progress}</td>
            <td>${rank}</td>
            <td class="award1"></td>
            <td class="award2"></td>
        `;

        tbody.appendChild(row);

        updateRow(row);

    });

    sortTableByTitle();
    updateCounters();
    filterTable();
}



sortTableByTitle();
updateCounters();
filterTable();



</script>

</body>
</html>
