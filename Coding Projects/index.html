<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #333;
            color: white;
            padding: 15px 20px;
        }

        .navbar h1 {
            display: inline;
        }

        .nav-links {
            float: right;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            color: #00bcd4;
        }

        /* Layout */
        .container {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 15px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin: 10px 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #333;
        }

        .sidebar ul li a:hover {
            color: #00bcd4;
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .message-box {
            background-color: #e8f5e9;
            border-left: 5px solid #4caf50;
            padding: 20px;
            border-radius: 5px;
        }

        .message-box h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <h1>Electro</h1>
        <div class="nav-links">
            <a href="#">About</a>
            <a href="#">Speedruns</a>
            <a href="Mastery.html">Mastery</a>
            <a href="#">Sports</a>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Menu</h2>
            <ul>
                <li><a href="#">Showcase</a></li>
                <li><a href="#">MKDD Timesheet</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Movies</a></li>
            </ul>
        </div>

        <!-- Content Area -->
        <div class="content">
            <div class="message-box">
                <h2>Welcome to My Website!</h2>
                <p>
                    hello
                </p>
            </div>
        </div>

    </div>

</body>
</html>
